name: Automated Quality Gate - API & E2E Tests

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.21'
  BASE_URL: 'http://localhost:3000'
  API_URL: 'http://localhost:8080'

jobs:
  # Job 1: Backend API Tests
  api-tests:
    name: 🔌 API Tests (Backend)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: playwright_template/package-lock.json

      - name: Install Playwright dependencies
        working-directory: ./playwright_template
        run: npm ci

      - name: Setup environment file
        working-directory: ./playwright_template
        run: |
          echo "TEST_ENV=staging" > .env
          echo "STAGING_BASE_URL=${{ env.BASE_URL }}" >> .env
          echo "STAGING_API_URL=${{ env.API_URL }}" >> .env

      - name: Start Go Backend
        working-directory: ./application_code
        run: |
          go run main.go &
          echo $! > backend.pid
          sleep 5

      - name: Health check backend
        run: |
          curl -f http://localhost:8080/api/health || exit 1
          echo "✅ Backend is healthy"

      - name: Run API Tests
        working-directory: ./playwright_template
        run: |
          npx playwright test tests/generated_test/api/ --reporter=html,json,junit
        env:
          API_BASE_URL: ${{ env.API_URL }}

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: |
            playwright_template/playwright-report/
            playwright_template/test-results/
          retention-days: 30

      - name: Stop Backend
        if: always()
        working-directory: ./application_code
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi

  # Job 2: E2E Frontend Tests
  e2e-tests:
    name: 🌐 E2E Tests (Frontend)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: application_code/package-lock.json

      - name: Install application dependencies
        working-directory: ./application_code
        run: npm ci

      - name: Install Playwright dependencies
        working-directory: ./playwright_template
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./playwright_template
        run: npx playwright install --with-deps chromium

      - name: Setup environment file
        working-directory: ./playwright_template
        run: |
          echo "TEST_ENV=staging" > .env
          echo "STAGING_BASE_URL=${{ env.BASE_URL }}" >> .env
          echo "STAGING_API_URL=${{ env.API_URL }}" >> .env

      - name: Start Go Backend
        working-directory: ./application_code
        run: |
          go run main.go &
          echo $! > backend.pid
          sleep 5

      - name: Start Next.js Frontend
        working-directory: ./application_code
        run: |
          npm run build
          npm run start &
          echo $! > frontend.pid
          sleep 10

      - name: Health check services
        run: |
          curl -f http://localhost:8080/api/health || exit 1
          curl -f http://localhost:3000/ || exit 1
          echo "✅ Both services are healthy"

      - name: Run E2E Tests
        working-directory: ./playwright_template
        run: |
          npx playwright test tests/generated_test/e2e/ --reporter=html,json,junit
        env:
          BASE_URL: ${{ env.BASE_URL }}

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            playwright_template/playwright-report/
            playwright_template/test-results/
          retention-days: 30

      - name: Upload test videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-videos
          path: playwright_template/test-results/**/video.webm
          retention-days: 7

      - name: Stop services
        if: always()
        working-directory: ./application_code
        run: |
          if [ -f frontend.pid ]; then
            kill $(cat frontend.pid) || true
          fi
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi

  # Job 3: Quality Gate - Aggregate Results
  quality-gate:
    name: 🚦 Quality Gate
    runs-on: ubuntu-latest
    needs: [api-tests, e2e-tests]
    if: always()
    
    steps:
      - name: Download API test results
        uses: actions/download-artifact@v4
        with:
          name: api-test-results
          path: ./api-results

      - name: Download E2E test results
        uses: actions/download-artifact@v4
        with:
          name: e2e-test-results
          path: ./e2e-results

      - name: Evaluate Quality Gate
        run: |
          echo "📊 Quality Gate Evaluation"
          echo "=========================="
          
          # Check if test result files exist
          API_PASSED=true
          E2E_PASSED=true
          
          if [ -d "./api-results/test-results" ]; then
            API_FAILURES=$(find ./api-results/test-results -name "*.xml" -exec grep -l 'failures="[1-9]' {} \; | wc -l)
            if [ "$API_FAILURES" -gt 0 ]; then
              echo "❌ API Tests: FAILED ($API_FAILURES failures)"
              API_PASSED=false
            else
              echo "✅ API Tests: PASSED"
            fi
          else
            echo "⚠️  API test results not found"
            API_PASSED=false
          fi
          
          if [ -d "./e2e-results/test-results" ]; then
            E2E_FAILURES=$(find ./e2e-results/test-results -name "*.xml" -exec grep -l 'failures="[1-9]' {} \; | wc -l)
            if [ "$E2E_FAILURES" -gt 0 ]; then
              echo "❌ E2E Tests: FAILED ($E2E_FAILURES failures)"
              E2E_PASSED=false
            else
              echo "✅ E2E Tests: PASSED"
            fi
          else
            echo "⚠️  E2E test results not found"
            E2E_PASSED=false
          fi
          
          echo "=========================="
          
          if [ "$API_PASSED" = false ] || [ "$E2E_PASSED" = false ]; then
            echo "🚫 Quality Gate: FAILED"
            echo "Deployment blocked due to test failures"
            exit 1
          else
            echo "🎉 Quality Gate: PASSED"
            echo "All tests passed - ready for deployment"
          fi

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const apiStatus = '${{ needs.api-tests.result }}' === 'success' ? '✅ PASSED' : '❌ FAILED';
            const e2eStatus = '${{ needs.e2e-tests.result }}' === 'success' ? '✅ PASSED' : '❌ FAILED';
            
            let comment = '## 🤖 Automated Quality Gate Results\n\n';
            comment += '| Test Suite | Status |\n';
            comment += '|------------|--------|\n';
            comment += '| 🔌 API Tests | ' + apiStatus + ' |\n';
            comment += '| 🌐 E2E Tests | ' + e2eStatus + ' |\n\n';
            
            if ('${{ needs.api-tests.result }}' === 'success' && '${{ needs.e2e-tests.result }}' === 'success') {
              comment += '### 🎉 All tests passed! This PR is ready to merge.\n';
            } else {
              comment += '### ⚠️ Some tests failed. Please review the test results before merging.\n';
            }
            
            comment += '\n📊 [View detailed test report in the Actions tab](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
  # Job 4: Deploy (only on main branch after quality gate passes)
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "🚀 Deploying to production..."
          echo "✅ Quality gate passed - deployment approved"
          # Add your deployment steps here
          # For example: deploy to cloud, update containers, etc.

      - name: Create deployment tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          TAG_NAME="release-$(date +%Y%m%d-%H%M%S)"
          git tag -a "$TAG_NAME" -m "Automated deployment after quality gate"
          echo "📦 Created deployment tag: $TAG_NAME"
